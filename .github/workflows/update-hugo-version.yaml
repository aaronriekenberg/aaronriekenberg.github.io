name: Update Hugo version

on:
  schedule:
    - cron: "17 6 * * 6" # Every Saturday at 6:17 AM
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-hugo-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update Hugo version file
        id: bump
        run: |
          set -euo pipefail

          version_file=".github/hugo-version.txt"
          current="$(tr -d '[:space:]' < "$version_file")"
          latest="$(curl -fsSL https://api.github.com/repos/gohugoio/hugo/releases/latest | jq -r '.tag_name' | sed -E 's/^v//')"

          if [[ -z "$current" ]]; then
            echo "Version file is empty: $version_file" >&2
            exit 1
          fi

          if [[ -z "$latest" || "$latest" == "null" ]]; then
            echo "Could not determine latest Hugo version" >&2
            exit 1
          fi

          echo "Current Hugo version: $current"
          echo "Latest Hugo version:  $latest"

          if [[ "$current" == "$latest" ]]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "current=$current" >> "$GITHUB_OUTPUT"
            echo "latest=$latest" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "$latest" > "$version_file"

          echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.bump.outputs.up_to_date == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(ci): bump Hugo to ${{ steps.bump.outputs.latest }}"
          title: "chore(ci): bump Hugo to ${{ steps.bump.outputs.latest }}"
          body: |
            Automated update of Hugo version in `.github/hugo-version.txt`.

            - Previous version: `${{ steps.bump.outputs.current }}`
            - New version: `${{ steps.bump.outputs.latest }}`
          branch: chore/update-hugo-version
          delete-branch: true
          add-paths: |
            .github/hugo-version.txt
